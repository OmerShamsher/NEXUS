<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Intelligent Conversation</title>
    <meta name="description" content="Nexus AI — A premium conversational AI experience powered by Gemini.">
    <link rel="stylesheet" href="style.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const API_KEY = "AIzaSyD1dwBMtv9e1M8WfEeBZUyvo0Yp8Gv-Qns";
        const MODEL   = "gemini-3.1-flash-lite-preview";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

        const SUGGESTED = [
            "Explain quantum computing in simple terms",
            "Write a short story about a time traveler",
            "Help me debug a React useState issue",
            "What are the principles of good UI design?",
        ];

        /* ── Icons ──────────────────────────────────────────── */
        const Icon = ({ name, size = 20 }) => {
            const paths = {
                send:    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>,
                plus:    <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                edit:    <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                trash:   <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                chat:    <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
                menu:    <><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>,
                nexus:   <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>,
                copy:    <><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>,
                check:   <polyline points="20 6 9 17 4 12"/>,
                stop:    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>,
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {paths[name]}
                </svg>
            );
        };

        /* ── Copy Button ────────────────────────────────────── */
        const CopyBtn = ({ text }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = () => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };
            return (
                <button onClick={handleCopy} className="copy-btn" title="Copy">
                    <Icon name={copied ? "check" : "copy"} size={14} />
                </button>
            );
        };

        /* ── Message Bubble ─────────────────────────────────── */
        const Message = ({ msg }) => {
            const isUser = msg.role === 'user';
            return (
                <div className={`msg-row ${isUser ? 'msg-user' : 'msg-ai'}`}>
                    {!isUser && (
                        <div className="ai-avatar">
                            <Icon name="nexus" size={16} />
                        </div>
                    )}
                    <div className={`msg-bubble ${isUser ? 'bubble-user' : 'bubble-ai'}`}>
                        {!isUser && <div className="ai-label">Nexus</div>}
                        <div className="msg-text" style={{whiteSpace:'pre-wrap'}}>{msg.content}</div>
                        {!isUser && <CopyBtn text={msg.content} />}
                    </div>
                    {isUser && <div className="user-avatar">U</div>}
                </div>
            );
        };

        /* ── Typing Dots ────────────────────────────────────── */
        const TypingDots = () => (
            <div className="msg-row msg-ai">
                <div className="ai-avatar"><Icon name="nexus" size={16} /></div>
                <div className="bubble-ai typing-bubble">
                    <div className="ai-label">Nexus</div>
                    <div className="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        );

        /* ── Sidebar Item ───────────────────────────────────── */
        const SidebarItem = ({ chat, active, onSelect, onDelete }) => (
            <div className={`sidebar-item ${active ? 'active' : ''}`} onClick={onSelect}>
                <Icon name="chat" size={14} />
                <span className="sidebar-title">{chat.title}</span>
                <button className="sidebar-delete" onClick={(e) => { e.stopPropagation(); onDelete(); }}>
                    <Icon name="trash" size={13} />
                </button>
            </div>
        );

        /* ── Main App ───────────────────────────────────────── */
        const App = () => {
            const [chats, setChats] = useState([
                { id: 1, title: 'New Conversation', messages: [] }
            ]);
            const [activeChatId, setActiveChatId] = useState(1);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const bottomRef = useRef(null);
            const textareaRef = useRef(null);

            const activeChat = chats.find(c => c.id === activeChatId) || chats[0];
            const messages = activeChat?.messages || [];

            useEffect(() => {
                bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, loading]);

            const updateChat = (id, updater) => {
                setChats(prev => prev.map(c => c.id === id ? updater(c) : c));
            };

            const newChat = () => {
                const id = Date.now();
                setChats(prev => [{ id, title: 'New Conversation', messages: [] }, ...prev]);
                setActiveChatId(id);
                setInput('');
            };

            const deleteChat = (id) => {
                setChats(prev => {
                    const next = prev.filter(c => c.id !== id);
                    if (activeChatId === id && next.length > 0) setActiveChatId(next[0].id);
                    return next.length > 0 ? next : [{ id: Date.now(), title: 'New Conversation', messages: [] }];
                });
            };

            const handleSend = async (text) => {
                const msg = (text || input).trim();
                if (!msg || loading) return;
                setInput('');

                const userMsg = { role: 'user', content: msg };
                const updatedMessages = [...messages, userMsg];

                // Auto-title the chat from first message
                if (messages.length === 0) {
                    const title = msg.length > 40 ? msg.slice(0, 40) + '…' : msg;
                    updateChat(activeChatId, c => ({ ...c, title, messages: updatedMessages }));
                } else {
                    updateChat(activeChatId, c => ({ ...c, messages: updatedMessages }));
                }

                setLoading(true);
                try {
                    const history = updatedMessages.map(m => ({
                        role: m.role === 'user' ? 'user' : 'model',
                        parts: [{ text: m.content }]
                    }));

                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: history })
                    });

                    if (res.status === 429) throw new Error("Rate limit reached. Please wait a moment and try again.");
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err?.error?.message || `API error ${res.status}`);
                    }

                    const data = await res.json();
                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";

                    updateChat(activeChatId, c => ({
                        ...c,
                        messages: [...c.messages, { role: 'assistant', content: reply }]
                    }));
                } catch (err) {
                    updateChat(activeChatId, c => ({
                        ...c,
                        messages: [...c.messages, { role: 'assistant', content: `⚠️ ${err.message}` }]
                    }));
                } finally {
                    setLoading(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            };

            const adjustHeight = () => {
                const ta = textareaRef.current;
                if (ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 200) + 'px'; }
            };

            const isEmpty = messages.length === 0;

            return (
                <div className="app">
                    {/* Sidebar */}
                    <aside className={`sidebar ${sidebarOpen ? 'open' : 'closed'}`}>
                        <div className="sidebar-header">
                            <div className="brand">
                                <Icon name="nexus" size={22} />
                                <span>Nexus AI</span>
                            </div>
                            <button className="icon-btn" onClick={newChat} title="New chat">
                                <Icon name="plus" size={18} />
                            </button>
                        </div>
                        <div className="sidebar-list">
                            {chats.map(chat => (
                                <SidebarItem
                                    key={chat.id}
                                    chat={chat}
                                    active={chat.id === activeChatId}
                                    onSelect={() => setActiveChatId(chat.id)}
                                    onDelete={() => deleteChat(chat.id)}
                                />
                            ))}
                        </div>
                        <div className="sidebar-footer">
                            <div className="model-tag">gemini-3.1-flash-lite-preview</div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="main">
                        {/* Top Bar */}
                        <div className="topbar">
                            <button className="icon-btn" onClick={() => setSidebarOpen(o => !o)}>
                                <Icon name="menu" size={20} />
                            </button>
                            <span className="topbar-title">{activeChat?.title}</span>
                            <button className="icon-btn new-chat-btn" onClick={newChat} title="New chat">
                                <Icon name="edit" size={18} />
                            </button>
                        </div>

                        {/* Chat Area */}
                        <div className="chat-area">
                            {isEmpty ? (
                                <div className="empty-state">
                                    <div className="empty-logo">
                                        <Icon name="nexus" size={40} />
                                    </div>
                                    <h1 className="empty-title">How can I help you?</h1>
                                    <p className="empty-sub">Powered by Gemini 3.1 Flash Lite Preview</p>
                                    <div className="suggestions">
                                        {SUGGESTED.map((s, i) => (
                                            <button key={i} className="suggestion-card" onClick={() => handleSend(s)}>
                                                {s}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="messages">
                                    {messages.map((msg, i) => <Message key={i} msg={msg} />)}
                                    {loading && <TypingDots />}
                                    <div ref={bottomRef} />
                                </div>
                            )}
                        </div>

                        {/* Input */}
                        <div className="input-wrap">
                            <div className="input-box">
                                <textarea
                                    ref={textareaRef}
                                    value={input}
                                    onChange={e => { setInput(e.target.value); adjustHeight(); }}
                                    onKeyDown={handleKeyDown}
                                    placeholder="Message Nexus..."
                                    rows={1}
                                    disabled={loading}
                                    className="chat-input"
                                />
                                <button
                                    onClick={() => handleSend()}
                                    disabled={!input.trim() || loading}
                                    className={`send-btn ${input.trim() && !loading ? 'active' : ''}`}
                                >
                                    <Icon name={loading ? "stop" : "send"} size={18} />
                                </button>
                            </div>
                            <p className="input-disclaimer">Nexus can make mistakes. Verify important information.</p>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
