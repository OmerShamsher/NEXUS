<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Premium Digital Experience</title>
    <meta name="description" content="A high-end, luxury digital product experience with neon accents and fluid animations.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Scripts for React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion (CDN version, note: motion is usually used via npm, for CDN we use a similar animation library or standard CSS transitions if motion is tricky via CDN) -->
    <!-- Instead of motion via CDN which is hard to use with Babel locally without build, I will use AOS for scroll animations and standard CSS/React state for hover effects to maintain premium feel -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            cyan: '#00F2FF',
                            purple: '#BC00FF',
                        },
                        dark: {
                            base: '#030303',
                            surface: '#0A0A0A',
                            accent: '#111111',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-base text-white">
    <div id="root"></div>
    <div class="bg-mesh"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // UI Components
        const Icon = ({ name, className = "" }) => {
            const icons = {
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                "alert-circle": <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                image: <g><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></g>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" />,
                "external-link": <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6m3-3h7v7m-7 0 9-9" />,
                "arrow-up-right": <path d="M7 7h10v10M7 17 17 7" />
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width="24" 
                    height="24" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass glass-card rounded-2xl p-6 ${className}`}>
                {children}
            </div>
        );

        const GlowButton = ({ children, primary = false, onClick }) => {
            const baseStyles = "px-8 py-3 rounded-full font-semibold transition-all duration-300 relative overflow-hidden group";
            const colorStyles = primary 
                ? "bg-neon-cyan text-black hover:shadow-[0_0_20px_rgba(0,242,255,0.6)]" 
                : "bg-transparent border border-white/20 hover:border-neon-purple text-white hover:shadow-[0_0_20px_rgba(188,0,255,0.4)]";
            
            return (
                <button className={`${baseStyles} ${colorStyles}`} onClick={onClick}>
                    <span className="relative z-10">{children}</span>
                    <div className={`absolute inset-0 opacity-0 group-hover:opacity-20 transition-opacity bg-white`}></div>
                </button>
            );
        };

        const Navbar = () => (
            <nav className="fixed top-0 left-0 w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-md bg-dark-base/50 border-b border-white/5">
                <div className="flex items-center gap-2">
                    <div className="w-8 h-8 bg-gradient-to-tr from-neon-cyan to-neon-purple rounded-lg rotate-12"></div>
                    <span className="text-2xl font-bold tracking-tighter">NEXUS</span>
                </div>
                <div className="hidden md:flex gap-10 items-center text-sm font-medium text-white/70">
                    <a href="#" className="hover:text-neon-cyan transition-colors">Vision</a>
                    <a href="#dashboard" className="hover:text-neon-cyan transition-colors">Intelligence</a>
                    <a href="#" className="hover:text-neon-cyan transition-colors">Ecosystem</a>
                    <GlowButton primary={false}>Access Alpha</GlowButton>
                </div>
            </nav>
        );

        const Hero = () => (
            <section className="min-h-[60vh] flex flex-col justify-center items-center px-4 pt-32">
                <div className="text-center max-w-4xl" data-aos="fade-up">
                    <div className="inline-block px-4 py-1 rounded-full border border-neon-cyan/30 bg-neon-cyan/5 text-neon-cyan text-xs font-bold tracking-[0.2em] uppercase mb-6 glow-text-cyan">
                        Neural Core V3.0 Activated
                    </div>
                    <h1 className="text-6xl md:text-8xl font-bold mb-8 leading-tight tracking-tight">
                        Nexus <span className="bg-clip-text text-transparent bg-gradient-to-r from-neon-cyan via-white to-neon-purple text-glow">Intelligence.</span>
                    </h1>
                    <p className="text-xl text-white/50 mb-12 max-w-2xl mx-auto font-light">
                        Communicating with the deep-layer Gemini matrix. Ask anything to the future of decentralized logic.
                    </p>
                    <div className="flex gap-4 justify-center">
                        <a href="#chat-interface">
                            <GlowButton primary={true}>Initialize Node</GlowButton>
                        </a>
                    </div>
                </div>
            </section>
        );

        const NexusAI = () => {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Nexus Intelligence initialized. I am your direct link to the Gemini matrix. How shall we expand the digital horizon today?' }
            ]);
            const [input, setInput] = useState("");
            const [loading, setLoading] = useState(false);
            const chatEndRef = React.useRef(null);

            const scrollToEnd = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => scrollToEnd(), [messages]);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;

                const userMessage = input;
                setInput("");
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);

                try {
                    const API_KEY = "AIzaSyD1dwBMtv9e1M8WfEeBZUyvo0Yp8Gv-Qns";
                    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

                    const response = await fetch(GEMINI_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: userMessage }]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error("Connection to Matrix Interrupted.");

                    const data = await response.json();
                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received from the neural core.";

                    setMessages(prev => [...prev, { role: 'assistant', content: aiResponse }]);
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'assistant', content: `CRITICAL ERROR: ${err.message}` }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <section id="chat-interface" className="py-20 px-4 max-w-5xl mx-auto min-h-screen">
                    <GlassCard className="h-[750px] flex flex-col p-4 md:p-8 gradient-border-mask relative overflow-hidden">
                        {/* Header */}
                        <div className="flex justify-between items-center mb-8 pb-6 border-b border-white/5">
                            <div className="flex items-center gap-4">
                                <div className="w-3 h-3 rounded-full bg-neon-cyan animate-pulse"></div>
                                <h3 className="text-xl font-bold tracking-tight">Nexus AI <span className="text-xs uppercase text-white/30 ml-2 font-light">Active Node</span></h3>
                            </div>
                            <div className="flex gap-2">
                                <button className="p-2 rounded-lg bg-white/5 hover:bg-white/10 transition-all text-white/40 hover:text-white">
                                    <Icon name="zap" className="w-4 h-4" />
                                </button>
                            </div>
                        </div>

                        {/* Message Feed */}
                        <div className="flex-grow overflow-y-auto space-y-6 mb-8 pr-2 custom-scrollbar">
                            {messages.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                                    <div className={`max-w-[85%] px-6 py-4 rounded-3xl ${
                                        msg.role === 'user' 
                                        ? 'bg-gradient-to-r from-neon-purple/20 to-neon-cyan/20 border border-white/10 rounded-tr-none text-white/90' 
                                        : 'bg-white/5 border border-white/5 rounded-tl-none text-white/80'
                                    }`}>
                                        <div className="text-xs font-bold uppercase tracking-widest mb-2 opacity-30">
                                            {msg.role === 'user' ? 'Internal Client' : 'Nexus Core'}
                                        </div>
                                        <div className="whitespace-pre-wrap leading-relaxed text-sm">
                                            {msg.content}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {loading && (
                                <div className="flex justify-start animate-fade-in">
                                    <div className="bg-white/5 border border-white/5 px-6 py-4 rounded-3xl rounded-tl-none">
                                        <div className="flex gap-2">
                                            <div className="w-2 h-2 rounded-full bg-neon-cyan animate-bounce [animation-delay:-0.3s]"></div>
                                            <div className="w-2 h-2 rounded-full bg-neon-cyan animate-bounce [animation-delay:-0.15s]"></div>
                                            <div className="w-2 h-2 rounded-full bg-neon-cyan animate-bounce"></div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>

                        {/* Input Area */}
                        <form onSubmit={sendMessage} className="relative">
                            <input 
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                placeholder="Transmit data request to the matrix..."
                                className="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 pr-16 text-white text-sm focus:outline-none focus:border-neon-cyan transition-all"
                                disabled={loading}
                            />
                            <button 
                                type="submit"
                                disabled={!input.trim() || loading}
                                className="absolute right-4 top-1/2 -translate-y-1/2 p-3 rounded-xl bg-neon-cyan/10 hover:bg-neon-cyan text-neon-cyan hover:text-black transition-all disabled:opacity-30 disabled:cursor-not-allowed group"
                            >
                                <Icon name="zap" className="w-5 h-5 transition-transform group-hover:scale-110" />
                            </button>
                        </form>
                    </GlassCard>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-20 border-t border-white/5 bg-dark-surface/50 mt-32">
                <div className="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-4 gap-12">
                    <div className="col-span-2">
                         <div className="flex items-center gap-2 mb-6">
                            <div className="w-8 h-8 bg-gradient-to-tr from-neon-cyan to-neon-purple rounded-lg rotate-12"></div>
                            <span className="text-2xl font-bold tracking-tighter">NEXUS</span>
                        </div>
                        <p className="text-white/30 max-w-sm">
                            Defining the next epoch of digital interaction and atmospheric product design. Crafting interfaces that breathe and economies that scale.
                        </p>
                    </div>
                    <div>
                        <h4 className="font-bold mb-6 text-sm uppercase tracking-widest">Connect</h4>
                        <ul className="text-white/40 space-y-4 text-sm">
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Twitter / X</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Discord</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Terminal Beta</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="font-bold mb-6 text-sm uppercase tracking-widest">Nexus OS</h4>
                        <ul className="text-white/40 space-y-4 text-sm">
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Documentation</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Governance</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Infrastructure</a></li>
                        </ul>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-8 mt-20 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between text-[10px] text-white/20 uppercase tracking-widest">
                    <span>© 2026 NEXUS PROTOCOL. ALL SYSTEMS NOMINAL.</span>
                    <div className="flex gap-8 mt-4 md:mt-0">
                        <a href="#">Security</a>
                        <a href="#">Privacy</a>
                        <a href="#">Terms</a>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                AOS.init({
                    duration: 1000,
                    once: true,
                    easing: 'ease-out-cubic'
                });

                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="relative z-10 overflow-hidden">
                    <div 
                        className="fixed inset-0 pointer-events-none transition-opacity duration-500"
                        style={{
                            zIndex: -1,
                            background: `radial-gradient(circle 600px at ${mousePos.x}px ${mousePos.y}px, rgba(0, 242, 255, 0.05), transparent 80%)`
                        }}
                    ></div>
                    <Navbar />
                    <Hero />
                    <NexusAI />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
