<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Premium Digital Experience</title>
    <meta name="description" content="A high-end, luxury digital product experience with neon accents and fluid animations.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Scripts for React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion (CDN version, note: motion is usually used via npm, for CDN we use a similar animation library or standard CSS transitions if motion is tricky via CDN) -->
    <!-- Instead of motion via CDN which is hard to use with Babel locally without build, I will use AOS for scroll animations and standard CSS/React state for hover effects to maintain premium feel -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            cyan: '#00F2FF',
                            purple: '#BC00FF',
                        },
                        dark: {
                            base: '#030303',
                            surface: '#0A0A0A',
                            accent: '#111111',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-base text-white">
    <div id="root"></div>
    <div class="bg-mesh"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // UI Components
        const Icon = ({ name, className = "" }) => {
            const icons = {
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                "alert-circle": <g><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></g>,
                image: <g><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></g>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" />,
                "external-link": <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6m3-3h7v7m-7 0 9-9" />,
                "arrow-up-right": <path d="M7 7h10v10M7 17 17 7" />
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width="24" 
                    height="24" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const GlassCard = ({ children, className = "" }) => (
            <div className={`glass glass-card rounded-2xl p-6 ${className}`}>
                {children}
            </div>
        );

        const GlowButton = ({ children, primary = false, onClick }) => {
            const baseStyles = "px-8 py-3 rounded-full font-semibold transition-all duration-300 relative overflow-hidden group";
            const colorStyles = primary 
                ? "bg-neon-cyan text-black hover:shadow-[0_0_20px_rgba(0,242,255,0.6)]" 
                : "bg-transparent border border-white/20 hover:border-neon-purple text-white hover:shadow-[0_0_20px_rgba(188,0,255,0.4)]";
            
            return (
                <button className={`${baseStyles} ${colorStyles}`} onClick={onClick}>
                    <span className="relative z-10">{children}</span>
                    <div className={`absolute inset-0 opacity-0 group-hover:opacity-20 transition-opacity bg-white`}></div>
                </button>
            );
        };

        const Navbar = () => (
            <nav className="fixed top-0 left-0 w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-md bg-dark-base/50 border-b border-white/5">
                <div className="flex items-center gap-2">
                    <div className="w-8 h-8 bg-gradient-to-tr from-neon-cyan to-neon-purple rounded-lg rotate-12"></div>
                    <span className="text-2xl font-bold tracking-tighter">NEXUS</span>
                </div>
                <div className="hidden md:flex gap-10 items-center text-sm font-medium text-white/70">
                    <a href="#" className="hover:text-neon-cyan transition-colors">Vision</a>
                    <a href="#dashboard" className="hover:text-neon-cyan transition-colors">Intelligence</a>
                    <a href="#" className="hover:text-neon-cyan transition-colors">Ecosystem</a>
                    <GlowButton primary={false}>Access Alpha</GlowButton>
                </div>
            </nav>
        );

        const Hero = () => (
            <section className="min-h-[80vh] flex flex-col justify-center items-center px-4 pt-20">
                <div className="text-center max-w-4xl" data-aos="fade-up">
                    <div className="inline-block px-4 py-1 rounded-full border border-neon-cyan/30 bg-neon-cyan/5 text-neon-cyan text-xs font-bold tracking-[0.2em] uppercase mb-6 glow-text-cyan">
                        Visual Intelligence Engine
                    </div>
                    <h1 className="text-6xl md:text-8xl font-bold mb-8 leading-tight tracking-tight">
                        Optimize Your <br/>
                        <span className="bg-clip-text text-transparent bg-gradient-to-r from-neon-cyan via-white to-neon-purple">Digital Assets.</span>
                    </h1>
                    <p className="text-xl text-white/50 mb-12 max-w-2xl mx-auto font-light">
                        Harness the power of Nexus Image Optimizer. Compression without compromise, powered by high-bandwidth neural processing.
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        <a href="#dashboard">
                            <GlowButton primary={true}>Start Optimizing</GlowButton>
                        </a>
                        <GlowButton>Documentation</GlowButton>
                    </div>
                </div>
            </section>
        );

        const Dashboard = () => {
            const [imageUrl, setImageUrl] = useState("");
            const [quality, setQuality] = useState(80);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleOptimize = async (e) => {
                e.preventDefault();
                if (!imageUrl) return;

                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const API_KEY = "zvs5oNys1zJjLJwhM7knAfPbdBKgsXyn";
                    const response = await fetch(`https://api.apilayer.com/image_optimizer/url?url=${encodeURIComponent(imageUrl)}&quality=${quality}`, {
                        method: 'GET',
                        headers: { 'apikey': API_KEY }
                    });

                    let data;
                    try {
                        data = await response.json();
                    } catch (e) {
                        throw new Error(`Server returned status ${response.status} but no valid JSON metadata.`);
                    }

                    if (!response.ok) {
                        throw new Error(data.message || data.error || `Optimization failed with code ${response.status}`);
                    }
                    
                    if (data.optimized_image) {
                        setResult(data.optimized_image);
                    } else {
                        throw new Error("Handshake successful but no optimized image link was generated.");
                    }
                } catch (err) {
                    console.error("Optimizer System Fault:", err);
                    setError(err.toString());
                } finally {
                    setLoading(false);
                }
            };

            return (
                <section id="dashboard" className="py-32 px-8 max-w-6xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 px-4 gap-6">
                        <div data-aos="fade-right">
                            <h2 className="text-4xl font-bold mb-4">Neural Optimizer</h2>
                            <p className="text-white/40">Input a public image URL to perform high-fidelity compression.</p>
                        </div>
                        <div className="flex gap-2" data-aos="fade-left">
                            <span className="w-2 h-2 rounded-full bg-neon-purple animate-pulse"></span>
                            <span className="text-[10px] uppercase tracking-widest text-neon-purple font-bold">Optimizer Core Ready</span>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                        {/* Control Panel */}
                        <div data-aos="fade-right">
                            <GlassCard className="gradient-border-mask">
                                <form onSubmit={handleOptimize} className="space-y-8">
                                    <div>
                                        <label className="block text-xs font-bold uppercase tracking-widest text-white/50 mb-3">Image Source URL</label>
                                        <input 
                                            type="url" 
                                            placeholder="https://images.unsplash.com/..."
                                            className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-neon-cyan transition-colors"
                                            value={imageUrl}
                                            onChange={(e) => setImageUrl(e.target.value)}
                                            required
                                        />
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between mb-3">
                                            <label className="text-xs font-bold uppercase tracking-widest text-white/50">Compression Quality</label>
                                            <span className="text-neon-cyan text-xs font-bold">{quality}%</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="1" 
                                            max="100" 
                                            value={quality}
                                            onChange={(e) => setQuality(e.target.value)}
                                            className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-neon-cyan"
                                        />
                                    </div>

                                    <button 
                                        type="submit" 
                                        disabled={loading}
                                        className={`w-full py-4 rounded-xl font-bold tracking-widest uppercase text-sm transition-all duration-300 flex items-center justify-center gap-3 ${
                                            loading 
                                            ? "bg-white/10 text-white/30 cursor-not-allowed" 
                                            : "bg-gradient-to-r from-neon-cyan to-neon-purple text-black hover:shadow-[0_0_30px_rgba(0,242,255,0.4)]"
                                        }`}
                                    >
                                        {loading ? (
                                            <>
                                                <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                Processing Matrix...
                                            </>
                                        ) : (
                                            <>
                                                <Icon name="zap" className="w-4 h-4" />
                                                Optimize Asset
                                            </>
                                        )}
                                    </button>
                                </form>

                                {error && (
                                    <div className="mt-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-start gap-3">
                                        <Icon name="alert-circle" className="w-4 h-4 mt-0.5 shrink-0" />
                                        <span className="break-words w-full">{error}</span>
                                    </div>
                                )}
                            </GlassCard>
                        </div>

                        {/* Result Display */}
                        <div data-aos="fade-left">
                            <GlassCard className="h-full flex flex-col justify-center items-center min-h-[400px] relative overflow-hidden group">
                                {!result && !loading && (
                                    <div className="text-center space-y-4 opacity-30 group-hover:opacity-50 transition-opacity">
                                        <Icon name="image" className="w-16 h-16 mx-auto mb-4" />
                                        <p className="text-sm tracking-widest uppercase">Awaiting Data Input</p>
                                    </div>
                                )}

                                {loading && (
                                    <div className="text-center space-y-6">
                                        <div className="relative">
                                            <div className="w-20 h-20 border-t-2 border-neon-cyan rounded-full animate-spin"></div>
                                            <div className="absolute inset-0 w-20 h-20 border-b-2 border-neon-purple rounded-full animate-spin-reverse opacity-50"></div>
                                        </div>
                                        <p className="text-neon-cyan text-sm font-bold tracking-[0.3em] uppercase animate-pulse">Scanning Pixels</p>
                                    </div>
                                )}

                                {result && !loading && (
                                    <div className="w-full h-full animate-fade-in px-4">
                                        <div className="relative w-full aspect-video rounded-xl overflow-hidden mb-6 border border-white/10">
                                            <img src={result} alt="Optimized" className="w-full h-full object-contain" />
                                            <div className="absolute top-4 right-4 px-3 py-1 bg-neon-cyan text-black text-[10px] font-bold rounded-full">
                                                OPTIMIZED
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <a 
                                                href={result} 
                                                target="_blank" 
                                                className="flex items-center justify-between p-4 rounded-xl bg-white/5 border border-white/10 hover:border-neon-cyan transition-all group/link"
                                            >
                                                <div className="flex items-center gap-3">
                                                    <Icon name="download" className="w-4 h-4 text-neon-cyan" />
                                                    <span className="text-sm font-medium">Download Optimized Asset</span>
                                                </div>
                                                <Icon name="external-link" className="w-4 h-4 opacity-0 group-hover/link:opacity-100 transition-opacity" />
                                            </a>
                                            <p className="text-[10px] text-white/30 text-center uppercase tracking-[0.2em]">Asset ready for deployment</p>
                                        </div>
                                    </div>
                                )}

                                {/* Mesh Background for Card */}
                                <div className="absolute inset-0 bg-gradient-to-tr from-neon-cyan/5 to-neon-purple/5 -z-10"></div>
                            </GlassCard>
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-20 border-t border-white/5 bg-dark-surface/50 mt-32">
                <div className="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-4 gap-12">
                    <div className="col-span-2">
                         <div className="flex items-center gap-2 mb-6">
                            <div className="w-8 h-8 bg-gradient-to-tr from-neon-cyan to-neon-purple rounded-lg rotate-12"></div>
                            <span className="text-2xl font-bold tracking-tighter">NEXUS</span>
                        </div>
                        <p className="text-white/30 max-w-sm">
                            Defining the next epoch of digital interaction and atmospheric product design. Crafting interfaces that breathe and economies that scale.
                        </p>
                    </div>
                    <div>
                        <h4 className="font-bold mb-6 text-sm uppercase tracking-widest">Connect</h4>
                        <ul className="text-white/40 space-y-4 text-sm">
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Twitter / X</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Discord</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Terminal Beta</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 className="font-bold mb-6 text-sm uppercase tracking-widest">Nexus OS</h4>
                        <ul className="text-white/40 space-y-4 text-sm">
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Documentation</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Governance</a></li>
                            <li><a href="#" className="hover:text-neon-cyan transition-all">Infrastructure</a></li>
                        </ul>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto px-8 mt-20 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between text-[10px] text-white/20 uppercase tracking-widest">
                    <span>© 2026 NEXUS PROTOCOL. ALL SYSTEMS NOMINAL.</span>
                    <div className="flex gap-8 mt-4 md:mt-0">
                        <a href="#">Security</a>
                        <a href="#">Privacy</a>
                        <a href="#">Terms</a>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                AOS.init({
                    duration: 1000,
                    once: true,
                    easing: 'ease-out-cubic'
                });

                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="relative z-10 overflow-hidden">
                    <div 
                        className="fixed inset-0 pointer-events-none transition-opacity duration-500"
                        style={{
                            zIndex: -1,
                            background: `radial-gradient(circle 600px at ${mousePos.x}px ${mousePos.y}px, rgba(0, 242, 255, 0.05), transparent 80%)`
                        }}
                    ></div>
                    <Navbar />
                    <Hero />
                    <Dashboard />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
