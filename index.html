<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexChange | Premium Currency Converter</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            300: '#FDE047',
                            400: '#FACC15',
                            500: '#EAB308',
                            600: '#CA8A04',
                        },
                        violet: {
                            500: '#8B5CF6',
                            600: '#7C3AED',
                            800: '#5B21B6',
                            900: '#4C1D95',
                        },
                        dark: {
                            800: '#111115',
                            900: '#070709',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        /* Base Overrides */
        body {
            background-color: #070709;
            color: white;
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Hide Number Input Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        
        /* Custom scrollbar to keep it clean */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1); 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    
    <!-- Ambient Background Lighting -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-violet-600/30 rounded-full blur-[140px] mix-blend-screen animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[40%] h-[40%] bg-gold-500/20 rounded-full blur-[120px] mix-blend-screen animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[60%] h-[60%] bg-blue-600/20 rounded-full blur-[160px] mix-blend-screen animate-blob" style="animation-delay: 4s;"></div>
    </div>

    <!-- React App Root -->
    <div id="root" class="relative z-10 min-h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const API_KEY = "c5f6b264248a773f7dc75ff743b2f5e6";

        // Supported Currencies
        const CURRENCIES = [
            { code: "USD", name: "US Dollar", symbol: "$" },
            { code: "EUR", name: "Euro", symbol: "€" },
            { code: "GBP", name: "British Pound", symbol: "£" },
            { code: "JPY", name: "Japanese Yen", symbol: "¥" },
            { code: "AUD", name: "Australian Dollar", symbol: "A$" },
            { code: "CAD", name: "Canadian Dollar", symbol: "C$" },
            { code: "CHF", name: "Swiss Franc", symbol: "₣" },
            { code: "CNY", name: "Chinese Yuan", symbol: "¥" },
            { code: "INR", name: "Indian Rupee", symbol: "₹" },
            { code: "SGD", name: "Singapore Dollar", symbol: "S$" },
            { code: "AED", name: "Emirati Dirham", symbol: "د.إ" },
            { code: "ZAR", name: "South African Rand", symbol: "R" },
        ];

        // --- SVGs & Icons ---
        const SwapIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3h5v5"/><path d="M21 3 9 15"/><path d="M8 21H3v-5"/><path d="M3 21l12-12"/></svg>
        );
        const TrendingUpIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        );
        const GlobeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        );
        const AlertIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        );


        function App() {
            // Setup States
            const [amount, setAmount] = useState(1000);
            const [fromCurrency, setFromCurrency] = useState("USD");
            const [toCurrency, setToCurrency] = useState("EUR");
            const [rates, setRates] = useState(null);
            
            // UI States
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [result, setResult] = useState(null);
            const [lastUpdated, setLastUpdated] = useState("");

            useEffect(() => {
                // Pre-fetch rates on load
                fetchRates(true);
            }, []);

            // Free tier of exchangeratesapi behaves by giving Base EUR with all currencies.
            // Formula to convert A -> B: (Amount / Rate_A) * Rate_B
            const fetchRates = async (isInitial = false) => {
                setLoading(true);
                setError(null);
                
                try {
                    // Use http as requested or https, API docs say HTTP might be required for free tier depending on plan.
                    // We'll use http to comply exactly with standard free tier bounds, but via browser sometimes requires HTTPS.
                    // If HTTPS blocks, the catch block handles it gracefully.
                    const response = await fetch(`http://api.exchangeratesapi.io/v1/latest?access_key=${API_KEY}`);
                    const data = await response.json();

                    if (data.success) {
                        setRates(data.rates);
                        setLastUpdated(new Date(data.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                        
                        if (!isInitial) {
                            calculateConversion(amount, fromCurrency, toCurrency, data.rates);
                        } else {
                            calculateConversion(amount, fromCurrency, toCurrency, data.rates);
                        }
                    } else {
                        throw new Error(data.error?.info || "Failed to fetch rates from API.");
                    }
                } catch (err) {
                    // Handle CORS/HTTPS or general API errors gracefully with visually sexy fallback
                    setError(err.message === "Failed to fetch" 
                        ? "Network block (Free tier requires HTTP but browser forces HTTPS). Showing premium simulation!" 
                        : err.message);
                    
                    // Fallback Demo Data for perfect UI experience
                    const demoRates = { EUR: 1, USD: 1.08, GBP: 0.85, JPY: 160.5, AUD: 1.65, CAD: 1.47, CHF: 0.95, CNY: 7.8, INR: 90.2, SGD: 1.45, AED: 3.97, ZAR: 20.4 };
                    setRates(demoRates);
                    setLastUpdated("Live Preview");
                    calculateConversion(amount, fromCurrency, toCurrency, demoRates);
                }
                
                setLoading(false);
            };

            const calculateConversion = (amt, from, to, currentRates) => {
                if (!currentRates) return;
                
                const eurAmount = amt / currentRates[from];
                const converted = eurAmount * currentRates[to];
                setResult(converted);
            };

            const handleConvert = (e) => {
                if(e) e.preventDefault();
                // We use the cached rates to convert instantly. 
                // Only re-fetch if we really want to refresh. Let's just calculate.
                if (rates) {
                    calculateConversion(amount, fromCurrency, toCurrency, rates);
                } else {
                    fetchRates();
                }
            };

            const swapCurrencies = () => {
                setFromCurrency(toCurrency);
                setToCurrency(fromCurrency);
                if (rates) {
                    calculateConversion(amount, toCurrency, fromCurrency, rates); // Note the swapped args
                }
            };

            const formatCurrency = (val, currencyCode) => {
                if (val === null || isNaN(val)) return "0.00";
                return new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: currencyCode,
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(val);
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-4 md:p-8">
                    
                    {/* Brand Header */}
                    <motion.div 
                        initial={{ opacity: 0, y: -20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 0.8, ease: "easeOut" }}
                        className="fixed top-6 left-6 md:top-10 md:left-10 flex items-center gap-3 z-50"
                    >
                        <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-gold-400 to-gold-600 flex items-center justify-center shadow-[0_0_30px_rgba(250,204,21,0.3)]">
                            <GlobeIcon />
                        </div>
                        <h1 className="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-white/70">
                            NexChange
                        </h1>
                    </motion.div>

                    {/* Main Converter Layout */}
                    <div className="w-full max-w-2xl mx-auto relative z-10 mt-16 md:mt-0">
                        <motion.div 
                            initial={{ opacity: 0, scale: 0.95 }}
                            animate={{ opacity: 1, scale: 1 }}
                            transition={{ duration: 0.6, delay: 0.1, type: "spring", stiffness: 200, damping: 20 }}
                        >
                            <div className="text-center mb-10">
                                <h2 className="text-5xl md:text-6xl font-extrabold tracking-tight mb-4">
                                    Convert <span className="text-transparent bg-clip-text bg-gradient-to-r from-gold-300 to-gold-500">Wealth.</span>
                                </h2>
                                <p className="text-white/50 text-lg">Real-time global exchange rates at your fingertips.</p>
                            </div>

                            {/* The Glass Card */}
                            <div className="glass-panel rounded-[2.5rem] p-6 md:p-10 relative overflow-hidden">
                                {/* Card Internal Glow */}
                                <div className="absolute -top-32 -right-32 w-64 h-64 bg-gold-500/10 rounded-full blur-[80px]"></div>
                                
                                <form onSubmit={handleConvert}>
                                    
                                    {/* Amount Row */}
                                    <div className="mb-8 relative z-10">
                                        <label className="block text-white/50 text-sm font-semibold mb-3 uppercase tracking-wider">Amount</label>
                                        <div className="relative flex items-center">
                                            <span className="absolute left-6 text-3xl text-white/30 font-light">$</span>
                                            <input 
                                                type="number" 
                                                value={amount}
                                                onChange={(e) => {
                                                    setAmount(e.target.value);
                                                    if(rates) calculateConversion(e.target.value, fromCurrency, toCurrency, rates);
                                                }}
                                                className="w-full bg-white/5 border border-white/10 outline-none rounded-3xl py-5 pl-14 pr-6 text-4xl font-bold text-white transition-all focus:border-gold-500/50 focus:bg-white/10"
                                                placeholder="0.00"
                                            />
                                        </div>
                                    </div>

                                    {/* Selectors Row */}
                                    <div className="flex flex-col md:flex-row items-center gap-4 relative z-10">
                                        
                                        {/* From Currency */}
                                        <div className="w-full">
                                            <label className="block text-white/50 text-sm font-semibold mb-3 uppercase tracking-wider">From</label>
                                            <div className="relative group">
                                                <select 
                                                    value={fromCurrency}
                                                    onChange={(e) => {
                                                        setFromCurrency(e.target.value);
                                                        if(rates) calculateConversion(amount, e.target.value, toCurrency, rates);
                                                    }}
                                                    className="w-full appearance-none bg-white/5 border border-white/10 outline-none rounded-2xl py-4 px-5 text-xl font-medium text-white cursor-pointer transition-all group-hover:bg-white/10 focus:border-gold-500/50"
                                                >
                                                    {CURRENCIES.map(c => (
                                                        <option key={c.code} value={c.code} className="bg-dark-900 text-white">
                                                            {c.code} - {c.name}
                                                        </option>
                                                    ))}
                                                </select>
                                                {/* Custom Arrow */}
                                                <div className="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-white/40 group-hover:text-white/80 transition-colors">
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Swap Button (Absolute center on desktop, inline on mobile) */}
                                        <div className="shrink-0 pt-0 md:pt-8 md:px-2 relative z-20">
                                            <motion.button 
                                                type="button"
                                                whileHover={{ scale: 1.1, rotate: 180 }}
                                                whileTap={{ scale: 0.9 }}
                                                transition={{ duration: 0.3 }}
                                                onClick={swapCurrencies}
                                                className="w-14 h-14 rounded-full bg-gradient-to-tr from-violet-600 to-indigo-500 flex items-center justify-center border-4 border-[#1c1c1f] shadow-xl text-white hover:shadow-[0_0_20px_rgba(139,92,246,0.4)] relative"
                                            >
                                                <SwapIcon />
                                            </motion.button>
                                        </div>

                                        {/* To Currency */}
                                        <div className="w-full">
                                            <label className="block text-white/50 text-sm font-semibold mb-3 uppercase tracking-wider">To</label>
                                            <div className="relative group">
                                                <select 
                                                    value={toCurrency}
                                                    onChange={(e) => {
                                                        setToCurrency(e.target.value);
                                                        if(rates) calculateConversion(amount, fromCurrency, e.target.value, rates);
                                                    }}
                                                    className="w-full appearance-none bg-white/5 border border-white/10 outline-none rounded-2xl py-4 px-5 text-xl font-medium text-white cursor-pointer transition-all group-hover:bg-white/10 focus:border-gold-500/50"
                                                >
                                                    {CURRENCIES.map(c => (
                                                        <option key={c.code} value={c.code} className="bg-dark-900 text-white">
                                                            {c.code} - {c.name}
                                                        </option>
                                                    ))}
                                                </select>
                                                {/* Custom Arrow */}
                                                <div className="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-white/40 group-hover:text-white/80 transition-colors">
                                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg>
                                                </div>
                                            </div>
                                        </div>

                                    </div>

                                    {/* Action & Status Row */}
                                    <div className="mt-10 flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                                        <div className="flex items-center gap-2 text-white/40 text-sm font-medium bg-white/5 py-2 px-4 rounded-full border border-white/5">
                                            <TrendingUpIcon />
                                            {loading ? "Syncing market data..." : <span>Market Rate Updated: <span className="text-white/80">{lastUpdated || "N/A"}</span></span>}
                                        </div>
                                        
                                        <motion.button 
                                            type="submit"
                                            whileHover={{ scale: 1.02 }}
                                            whileTap={{ scale: 0.98 }}
                                            className="w-full md:w-auto px-10 py-4 rounded-2xl bg-gradient-to-r from-gold-500 to-gold-600 text-dark-900 font-bold text-lg shadow-[0_10px_30px_rgba(234,179,8,0.3)] hover:shadow-[0_15px_40px_rgba(234,179,8,0.5)] transition-all flex items-center justify-center gap-2"
                                        >
                                            {loading ? (
                                                <div className="w-6 h-6 border-2 border-dark-900/30 border-t-dark-900 rounded-full animate-spin"></div>
                                            ) : "Convert Now"}
                                        </motion.button>
                                    </div>
                                    
                                </form>
                            </div>
                        </motion.div>

                        {/* Result Section */}
                        <AnimatePresence>
                            {result !== null && !loading && (
                                <motion.div 
                                    initial={{ opacity: 0, y: 30, scale: 0.9 }}
                                    animate={{ opacity: 1, y: 0, scale: 1 }}
                                    transition={{ type: "spring", stiffness: 200, damping: 20 }}
                                    className="mt-8 pt-8 border-t border-white/5 relative"
                                >
                                    <div className="text-center">
                                        <p className="text-white/50 text-lg md:text-xl font-medium mb-2">
                                            {amount || 0} {fromCurrency} equals
                                        </p>
                                        <h3 className="text-6xl md:text-7xl font-extrabold tracking-tighter text-white">
                                            {formatCurrency(result, toCurrency)}
                                        </h3>
                                        {/* Subtle exchange rate hint */}
                                        {rates && (
                                            <p className="text-white/30 text-sm mt-4 font-medium">
                                                1 {fromCurrency} = {((1 / rates[fromCurrency]) * rates[toCurrency]).toFixed(6)} {toCurrency}
                                            </p>
                                        )}
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                        
                        {/* Error Bubble */}
                        <AnimatePresence>
                            {error && (
                                <motion.div 
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    exit={{ opacity: 0, y: 20 }}
                                    className="mt-6 mx-auto max-w-lg bg-red-500/10 border border-red-500/20 text-red-200 px-6 py-4 rounded-2xl flex items-start gap-4 backdrop-blur-md"
                                >
                                    <AlertIcon />
                                    <p className="font-medium text-sm leading-relaxed flex-1">{error}</p>
                                </motion.div>
                            )}
                        </AnimatePresence>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
